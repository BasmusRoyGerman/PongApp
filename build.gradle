plugins {
    id 'java'
    id 'application'
}

group = 'pong'
version = '1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'pong.PongApp'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'pong.PongApp'
        )
    }
}
